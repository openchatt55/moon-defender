<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moon Defenders</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading-screen" class="loading-screen" aria-live="polite" aria-label="Moon Defenders is loading">
      <div class="intro-sky" aria-hidden="true">
        <span class="planet planet-earth"></span>
        <span class="planet planet-moon"></span>
        <span class="shooting-star shooting-star-one"></span>
        <span class="shooting-star shooting-star-two"></span>
      </div>

      <div class="intro-base" aria-hidden="true">
        <span class="crystal crystal-left"></span>
        <span class="crystal crystal-right"></span>
        <span class="dome dome-left"></span>
        <span class="dome dome-center"></span>
        <span class="dome dome-right"></span>
        <span class="turret"></span>
        <span class="rover"></span>
        <span class="robot-guard"></span>
      </div>

      <div class="intro-aliens" aria-hidden="true">
        <span class="alien alien-boss"></span>
        <span class="alien alien-small"></span>
        <span class="alien alien-orb"></span>
      </div>

      <section class="intro-card" aria-label="Loading progress">
        <h1 class="intro-logo" aria-label="Moon Defenders">
          <span>MOON</span>
          <span>DEFENDERS</span>
        </h1>
        <div class="loading-console">
          <div class="loading-track" role="progressbar" aria-label="Loading Moon Defenders" aria-valuemin="0" aria-valuemax="100">
            <span class="loading-fill"></span>
          </div>
        </div>
        <p class="loading-tip"><strong>TIP:</strong> Build shields before heavy waves.</p>
      </section>
    </div>

    <main id="main-menu" class="main-menu" aria-labelledby="game-title" hidden>
      <section class="hud hud-left" aria-label="Commander profile">
        <span class="hud-label">Commander</span>
        <span class="hud-value">Level 1</span>
      </section>

      <section class="hud resources" aria-label="Resources">
        <span><strong>Gold:</strong> 10000</span>
        <span><strong>Diamonds:</strong> 100</span>
        <span><strong>Energy:</strong> 15/15</span>
      </section>

      <section class="menu-panel" aria-label="Main menu">
        <p class="season">SEASON 1</p>
        <h1 id="game-title">MOON DEFENDERS</h1>
        <p class="tagline">Command the moon base. Hold the night line.</p>

        <nav class="menu-buttons" aria-label="Game sections">
          <button class="menu-button start-button" type="button">START GAME</button>
          <button class="menu-button shop-button" type="button">SHOP</button>
          <button class="menu-button" type="button">SEASON PASS</button>
          <button class="menu-button" type="button">MISSIONS</button>
          <button class="menu-button" type="button">MAIL</button>
          <button class="menu-button" type="button">SETTINGS</button>
        </nav>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
